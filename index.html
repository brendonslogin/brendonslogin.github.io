<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Bank App</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg,#667eea,#764ba2); color:white; text-align:center; margin:0; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .box { background:white; color:black; padding:20px; margin:10px auto; width:100%; max-width:480px; border-radius:20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        input, button { margin:8px 0; padding:12px; width:95%; border-radius:12px; border:1px solid #ddd; box-sizing: border-box; outline: none; }
        button { background:#667eea; color:white; font-weight:bold; cursor:pointer; border:none; transition: 0.2s; }
        button:hover { background:#5a67d8; transform: translateY(-1px); }
        .hidden { display:none; }
        
        /* PFP Styles */
        .pfp-display { font-size: 50px; margin: 10px 0; background: #f0f4ff; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; display: inline-block; border: 3px solid #667eea; }
        .pfp-option { font-size: 24px; cursor: pointer; padding: 5px; border-radius: 8px; transition: 0.2s; border: 1px solid transparent; display: inline-block; }
        .pfp-option:hover { background: #eee; border-color: #667eea; }

        /* Chat Styles */
        .chat-wrapper { border: 1px solid #eee; border-radius: 16px; overflow: hidden; background: #fff; margin-top: 15px; }
        .chat-container { height: 280px; overflow-y: auto; text-align: left; padding: 15px; background: #f9f9fb; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; margin: 4px 0; border-radius: 12px; max-width: 85%; font-size: 0.9em; position: relative; }
        .sender-info { font-size: 0.7em; font-weight: bold; margin-bottom: 2px; color: #555; display: flex; align-items: center; gap: 5px; }
        .me { background: #667eea; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .other { background: #e9e9eb; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        /* Layout */
        .tab-buttons { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .tab-buttons button { width: auto; padding: 8px 20px; background: #eee; color: #555; }
        .tab-buttons button.active { background: #667eea; color: white; }
    </style>
</head>
<body>

<div class="box" id="login">
    <h2 id="title">Pro Bank Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="go()">Enter Bank</button>
    <button onclick="toggle()" style="background:none; color:#667eea;">Create Account</button>
    <p id="msg" style="color:red; font-weight:bold;"></p>
</div>

<div class="box hidden" id="app">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div id="myPfp" class="pfp-display" style="width:40px; height:40px; line-height:40px; font-size:20px;">👤</div>
        <button onclick="logout()" style="width:auto; padding:5px 10px; background:#ff4d4d; font-size:0.7em;">Logout</button>
    </div>

    <h1 style="margin:5px 0;">$<span id="bal">0</span></h1>
    
    <div class="tab-buttons">
        <button id="btnDash" class="active" onclick="showTab('dashboard')">Home</button>
        <button id="btnChat" onclick="showTab('chat')">Chat</button>
    </div>

    <div id="dashboardTab">
        <div style="background:#f9f9fb; padding:10px; border-radius:15px; margin-bottom:15px;">
            <p style="margin:0; font-size:0.8em; color:#666;">Choose your Permanent PFP:</p>
            <div id="pfpPicker">
                <span class="pfp-option" onclick="setPfp('💰')">💰</span>
                <span class="pfp-option" onclick="setPfp('🦁')">🦁</span>
                <span class="pfp-option" onclick="setPfp('💎')">💎</span>
                <span class="pfp-option" onclick="setPfp('🔥')">🔥</span>
                <span class="pfp-option" onclick="setPfp('👑')">👑</span>
                <span class="pfp-option" onclick="setPfp('👻')">👻</span>
            </div>
        </div>
        
        <button onclick="openTask()" style="background:#48bb78;">📺 Earn $50</button>
        <button onclick="claimTask()" style="background:#38a169;">Claim Reward</button>
        <div id="paycheckTimer" style="font-weight:bold; margin-top:10px; color:#764ba2;">...</div>
        <button id="claimPaycheckBtn" disabled>Claim $10 Paycheck</button>
    </div>

    <div id="chatTab" class="hidden">
        <div class="chat-wrapper">
            <div id="chatBox" class="chat-container"></div>
            <div style="padding:10px; border-top:1px solid #eee;">
                <input id="chatUser" placeholder="Send to... (Blank for Global)" style="height:30px; font-size:0.8em;">
                <div style="display:flex; gap:5px;">
                    <input id="chatMsg" placeholder="Message..." style="flex:1; margin:0;">
                    <button onclick="sendMsg()" style="width:60px; margin:0;">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const config = {
    apiKey: "AIzaSyCL98jL_NJHCsaLN8q4SUD_N26mUyqYnjI",
    databaseURL: "https://brendonslogin-default-rtdb.firebaseio.com"
};
firebase.initializeApp(config);
const db = firebase.database();

let currentUser = "", loginMode = true, userPfp = "👤";

function toggle() { loginMode = !loginMode; document.getElementById('title').innerText = loginMode ? "Pro Bank Login" : "Create Account"; }
function showTab(name) {
    document.getElementById('dashboardTab').classList.toggle('hidden', name !== 'dashboard');
    document.getElementById('chatTab').classList.toggle('hidden', name !== 'chat');
    document.getElementById('btnDash').classList.toggle('active', name === 'dashboard');
    document.getElementById('btnChat').classList.toggle('active', name === 'chat');
}

function go() {
    let u = document.getElementById('user').value.trim().toLowerCase();
    let p = document.getElementById('pass').value.trim();
    db.ref('users/' + u).get().then(s => {
        if (loginMode) {
            if (s.exists() && String(s.val().password) === String(p)) {
                localStorage.setItem('u', u); start(u);
            } else { alert("Wrong Login!"); }
        } else {
            if (s.exists()) return alert("Taken!");
            db.ref('users/' + u).set({ password: String(p), balance: 10, pfp: "👤" }).then(() => { location.reload(); });
        }
    });
}

function start(u) {
    currentUser = u;
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    
    // Load Permanent PFP & Balance
    db.ref('users/' + u).on('value', s => {
        const data = s.val();
        document.getElementById('bal').innerText = data.balance || 0;
        userPfp = data.pfp || "👤";
        document.getElementById('myPfp').innerText = userPfp;
    });

    // Chat with PFPs
    db.ref('messages').on('value', s => {
        const box = document.getElementById('chatBox'); box.innerHTML = "";
        const all = s.val() || {};
        const combined = { ...(all['global'] || {}), ...(all[currentUser] || {}) };
        
        Object.keys(combined).sort().forEach(key => {
            const m = combined[key];
            const div = document.createElement('div');
            div.className = `msg ${m.from === currentUser ? 'me' : 'other'}`;
            // Use the PFP sent with the message
            div.innerHTML = `<span class="sender-info"><span>${m.pfp || '👤'}</span> ${m.from}</span>${m.text}`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });

    startPaycheckTimer();
}

function setPfp(emoji) {
    userPfp = emoji;
    db.ref('users/' + currentUser + '/pfp').set(emoji);
    alert("Profile Picture Updated!");
}

function sendMsg() {
    let to = document.getElementById('chatUser').value.trim().toLowerCase() || "global";
    let text = document.getElementById('chatMsg').value.trim();
    if (!text) return;

    const msgObj = { from: currentUser, pfp: userPfp, text: text, time: Date.now() };
    db.ref('messages/' + to).push(msgObj);
    if (to !== "global") db.ref('messages/' + currentUser).push(msgObj);
    document.getElementById('chatMsg').value = "";
}

// Timer & Tasks (Keep existing logic)
function startPaycheckTimer() {
    const btn = document.getElementById('claimPaycheckBtn');
    const timerEl = document.getElementById('paycheckTimer');
    setInterval(async () => {
        let snap = await db.ref('paychecks/' + currentUser).get();
        let diff = ((snap.val()?.last || 0) + 43200000) - Date.now();
        if (diff <= 0) { timerEl.innerText = "READY!"; btn.disabled = false; }
        else { 
            btn.disabled = true;
            let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            timerEl.innerText = `${h}h ${m}m ${s}s`;
        }
    }, 1000);
    btn.onclick = () => {
        db.ref('users/' + currentUser + '/balance').transaction(b => (b||0)+10);
        db.ref('paychecks/' + currentUser).set({ last: Date.now() });
    };
}

function claimTask() {
    db.ref('tasks/' + currentUser).get().then(s => {
        if (s.exists()) return alert("Done!");
        db.ref('users/' + currentUser + '/balance').transaction(b => (b || 0) + 50);
        db.ref('tasks/' + currentUser).set(true);
    });
}
function openTask() { window.open("https://www.youtube.com/@mythvfact", "_blank"); }
function logout() { localStorage.removeItem('u'); location.reload(); }

let savedU = localStorage.getItem('u'); if (savedU) start(savedU);
</script>
</body>
</html>
